global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "gateway"
    static_configs:
      - targets: ["gateway:8000"]

  - job_name: "engine"
    static_configs:
      - targets: ["engine:8080"]

  - job_name: "sidecar"
    static_configs:
      - targets: ["sidecar:8001"]

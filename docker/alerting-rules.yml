groups:
  - name: inference_server
    rules:
      - alert: HighErrorRate
        expr: rate(gateway_requests_total{status_code=~"5.."}[2m]) / rate(gateway_requests_total[2m]) > 0.05
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Gateway error rate exceeds 5%"

      - alert: HighLatency
        expr: histogram_quantile(0.99, rate(gateway_request_duration_seconds_bucket[5m])) > 30
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "P99 gateway latency exceeds 30s"

      - alert: QueueSaturation
        expr: engine_pending_requests > 8
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "Engine pending requests exceeds threshold"

      - alert: CircuitBreakerOpen
        expr: gateway_circuit_breaker_state > 0
        for: 30s
        labels:
          severity: critical
        annotations:
          summary: "Circuit breaker is open"

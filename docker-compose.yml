services:
  gateway:
    build:
      context: .
      dockerfile: docker/gateway.dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./server_config.yaml:/app/server_config.yaml:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/readyz"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    # environment:
    #   - GATEWAY_OTLP_ENDPOINT=http://jaeger:4317
    restart: unless-stopped

  engine:
    build:
      context: .
      dockerfile: docker/inference.dockerfile
    ports:
      - "8080:8080"
    env_file:
      - .env
    volumes:
      - ./model-store:/mnt/models
      - ./server_config.yaml:/app/server_config.yaml:ro
      - /usr/lib/wsl:/usr/lib/wsl:ro
    depends_on:
      sidecar:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/startupz"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 120s
    environment:
      - LD_LIBRARY_PATH=/usr/lib/wsl/lib:/usr/local/cuda/lib64
      - VLLM_WORKER_MULTIPROC_METHOD=spawn
      # - ENGINE_OTLP_ENDPOINT=http://jaeger:4317
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped

  sidecar:
    build:
      context: .
      dockerfile: docker/sidecar.dockerfile
    ports:
      - "8001:8001"
      - "50051:50051"
    env_file:
      - .env
    environment:
      - HF_HUB_DISABLE_XET=1
      # - SIDECAR_OTLP_ENDPOINT=http://jaeger:4317
    volumes:
      - ./model-store:/mnt/models
      - ./server_config.yaml:/app/server_config.yaml:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/startupz"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 60s
    # depends_on:
    #   - redis
    restart: unless-stopped

  # redis:

services:
  gateway:
    build:
      context: .
      dockerfile: docker/gateway.dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./server_config.yaml:/app/server_config.yaml:ro
    restart: unless-stopped

  engine:
    build:
      context: .
      dockerfile: docker/inference.dockerfile
    ports:
      - "8080:8080"
    env_file:
      - .env
    volumes:
      - ./model-store:/mnt/models
      - ./server_config.yaml:/app/server_config.yaml:ro
      - /usr/lib/wsl:/usr/lib/wsl:ro
    depends_on:
      - sidecar
    environment:
      - LD_LIBRARY_PATH=/usr/lib/wsl/lib:/usr/local/cuda/lib64
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped

  sidecar:
    build:
      context: .
      dockerfile: docker/sidecar.dockerfile
    ports:
      - "8001:8001"
      - "50051:50051"
    env_file:
      - .env
    environment:
      - HF_HUB_DISABLE_XET=1
    volumes:
      - ./model-store:/mnt/models
      - ./server_config.yaml:/app/server_config.yaml:ro
    # depends_on:
    #   - redis
    restart: unless-stopped

  # redis:

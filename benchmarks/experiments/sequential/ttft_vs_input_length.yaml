# Experiment: TTFT vs Input Length
# Line plot of TTFT as a function of input token count.
# Input length is varied by concatenating short (32-token) prompts.
# Output is kept short (32 tokens) so decode doesn't dominate.

experiment:
  name: ttft_vs_input_length
  description: "TTFT scaling as input length increases (32 to 256 tokens)"

  conditions:
    input_3840:
      input_length: 3840
      max_tokens: 32
    input_5760:
      input_length: 5760
      max_tokens: 32
    input_8640:
      input_length: 8640
      max_tokens: 32
    input_12960:
      input_length: 12960
      max_tokens: 32

  dispatch:
    mode: sequential

  protocol:
    warmup_requests: 3
    runs: 3
    prompts_per_condition: 10
    cooldown_seconds: 5

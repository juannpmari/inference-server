# Experiment: Prefix Caching Impact on TTFT
# Dual-line comparison of TTFT with and without prefix caching across input lengths.
# Uses condition_groups to toggle ENGINE_ENABLE_PREFIX_CACHING and restart between groups.

experiment:
  name: prefix_caching_ttft
  description: "Impact of prefix caching on TTFT across input lengths (256 to 3840 tokens)"

  condition_groups:
    - name: cache_disabled
      engine_env:
        ENGINE_ENABLE_PREFIX_CACHING: "false"
      conditions:
        nocache_input_3840:
          input_length: 3840
          max_tokens: 32
        nocache_input_5760:
          input_length: 5760
          max_tokens: 32
        nocache_input_8640:
          input_length: 8640
          max_tokens: 32
        nocache_input_12960:
          input_length: 12960
          max_tokens: 32

    - name: cache_enabled
      engine_env:
        ENGINE_ENABLE_PREFIX_CACHING: "true"
      conditions:
        cache_input_3840:
          input_length: 3840
          max_tokens: 32
        cache_input_5760:
          input_length: 5760
          max_tokens: 32
        cache_input_8640:
          input_length: 8640
          max_tokens: 32
        cache_input_12960:
          input_length: 12960
          max_tokens: 32

  dispatch:
    mode: sequential

  protocol:
    warmup_requests: 3
    runs: 3
    prompts_per_condition: 1
    repeat: 10
    cooldown_seconds: 5

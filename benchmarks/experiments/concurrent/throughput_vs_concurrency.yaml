# Experiment: Output Token Throughput vs Concurrency Level
# Line plot of aggregate output tok/s as a function of concurrent request count.
# All conditions use the same prompt size; only concurrency varies.

experiment:
  name: throughput_vs_concurrency
  description: "Output token throughput scaling across concurrency levels (N=4,8,16,32,64,128,256,512,1024,2048,4096)"

  conditions:
    concurrency_4:
      input_length: 32
      max_tokens: 128
      dispatch:
        concurrency: 4
    concurrency_8:
      input_length: 32
      max_tokens: 128
      dispatch:
        concurrency: 8
    concurrency_16:
      input_length: 32
      max_tokens: 128
      dispatch:
        concurrency: 16
    concurrency_32:
      input_length: 32
      max_tokens: 128
      dispatch:
        concurrency: 32
    concurrency_64:
      input_length: 32
      max_tokens: 128
      dispatch:
        concurrency: 64
    # concurrency_128:
    #   input_length: 32
    #   max_tokens: 128
    #   dispatch:
    #     concurrency: 128
    # concurrency_256:
    #   input_length: 32
    #   max_tokens: 128
    #   dispatch:
    #     concurrency: 256
    # concurrency_512:
    #   input_length: 32
    #   max_tokens: 128
    #   dispatch:
    #     concurrency: 512
    # concurrency_1024:
    #   input_length: 32
    #   max_tokens: 128
    #   dispatch:
    #     concurrency: 1024
    # concurrency_2048:
    #   input_length: 32
    #   max_tokens: 128
    #   dispatch:
    #     concurrency: 2048
    # concurrency_4096:
    #   input_length: 32
    #   max_tokens: 128
    #   dispatch:
    #     concurrency: 4096

  dispatch:
    mode: concurrent
    concurrency: 4          # default, overridden per-condition

  protocol:
    warmup_requests: 5
    runs: 1
    cooldown_seconds: 5

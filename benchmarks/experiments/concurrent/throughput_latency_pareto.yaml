# Experiment: Throughput vs Latency Pareto Frontier
# Scatter plot of output throughput (tok/s) vs e2e latency (ms) across
# concurrency levels. Pareto-optimal points are identified and labeled.

experiment:
  name: throughput_latency_pareto
  description: "Throughput-latency Pareto frontier across concurrency levels (N=1,2,4,8,16,32,64)"

  conditions:
    n_1:
      input_length: 128
      max_tokens: 128
      dispatch:
        concurrency: 1
    n_2:
      input_length: 128
      max_tokens: 128
      dispatch:
        concurrency: 2
    n_4:
      input_length: 128
      max_tokens: 128
      dispatch:
        concurrency: 4
    n_8:
      input_length: 128
      max_tokens: 128
      dispatch:
        concurrency: 8
    n_16:
      input_length: 128
      max_tokens: 128
      dispatch:
        concurrency: 16
    n_32:
      input_length: 128
      max_tokens: 128
      dispatch:
        concurrency: 32
    n_64:
      input_length: 128
      max_tokens: 128
      dispatch:
        concurrency: 64

  dispatch:
    mode: concurrent
    concurrency: 1          # default, overridden per-condition

  protocol:
    warmup_requests: 5
    runs: 3
    prompts_per_condition: 25
    cooldown_seconds: 10

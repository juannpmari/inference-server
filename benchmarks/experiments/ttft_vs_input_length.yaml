# Experiment: TTFT vs Input Length
# Line plot of TTFT as a function of input token count.
# Input length is varied by concatenating short (32-token) prompts.
# Output is kept short (32 tokens) so decode doesn't dominate.

experiment:
  name: ttft_vs_input_length
  description: "TTFT scaling as input length increases (32 to 256 tokens)"

  conditions:
    input_32:
      prompt_pool: short
      concat: 1
      max_tokens: 32
    input_64:
      prompt_pool: short
      concat: 2
      max_tokens: 32
    input_96:
      prompt_pool: short
      concat: 3
      max_tokens: 32
    input_128:
      prompt_pool: short
      concat: 4
      max_tokens: 32
    input_160:
      prompt_pool: short
      concat: 5
      max_tokens: 32
    input_192:
      prompt_pool: short
      concat: 6
      max_tokens: 32
    input_224:
      prompt_pool: short
      concat: 7
      max_tokens: 32
    input_256:
      prompt_pool: short
      concat: 8
      max_tokens: 32

  dispatch:
    mode: sequential

  protocol:
    warmup_requests: 3
    runs: 3
    prompts_per_condition: 5
    cooldown_seconds: 5
